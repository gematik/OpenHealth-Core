name: Bindings Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: bindings-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  kotlin-bindings-host:
    name: Kotlin bindings (${{ matrix.module }} - ${{ matrix.display_name }})
    runs-on: ${{ matrix.runner }}
    env:
      OUT_ROOT: ${{ github.workspace }}/artifacts/${{ matrix.module }}/${{ matrix.display_name }}/generated/uniffi
      CARGO_TARGET_DIR: ${{ github.workspace }}/artifacts/${{ matrix.module }}/${{ matrix.display_name }}/cargo
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      RUST_BACKTRACE: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: healthcard
            runner: ubuntu-latest
            display_name: linux-x86_64
            platform: linux
            arch: x86_64
            library_file: libhealthcard.so
            just_shell: ""
          - module: healthcard
            runner: windows-latest
            display_name: windows-x86_64
            platform: windows
            arch: x86_64
            library_file: healthcard.dll
            just_shell: "C:/Program Files/Git/bin/bash.exe"
          - module: healthcard
            runner: macos-26
            display_name: darwin-aarch64
            platform: darwin
            arch: aarch64
            library_file: libhealthcard.dylib
            just_shell: ""
          - module: asn1
            runner: ubuntu-latest
            display_name: linux-x86_64
            platform: linux
            arch: x86_64
            library_file: libasn1.so
            just_shell: ""
          - module: asn1
            runner: windows-latest
            display_name: windows-x86_64
            platform: windows
            arch: x86_64
            library_file: asn1.dll
            just_shell: "C:/Program Files/Git/bin/bash.exe"
          - module: asn1
            runner: macos-26
            display_name: darwin-aarch64
            platform: darwin
            arch: aarch64
            library_file: libasn1.dylib
            just_shell: ""

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> ${{ env.CARGO_TARGET_DIR }}"

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Set up Java (Linux only)
        if: runner.os == 'Linux'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Ensure Android SDK platforms (Linux only)
        if: runner.os == 'Linux'
        run: |
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_SDK_ROOT}" --licenses >/dev/null || true
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_SDK_ROOT}" "platforms;android-34" "build-tools;34.0.0"

      - name: Install cargo-ndk (Linux only)
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Add Rust Android targets (Linux only)
        if: runner.os == 'Linux'
        run: rustup target add aarch64-linux-android x86_64-linux-android

      - name: Set Perl environment variables
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $perl = (where.exe perl)[0]
          echo "PERL=$perl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "OPENSSL_SRC_PERL=$perl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Setup MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Remove conflicting link.exe (Windows only)
        if: runner.os == 'Windows'
        run: |
          if [ -x /usr/bin/link ]; then
            rm -f /usr/bin/link
          fi

      - name: Build Kotlin bindings
        run: |
          if [ -n "${{ matrix.just_shell }}" ]; then
            just --shell="${{ matrix.just_shell }}" kotlin-bindings-generate ${{ matrix.module }} ${{ matrix.platform }} ${{ matrix.arch }} ${{ matrix.library_file }} release
          else
            just kotlin-bindings-generate ${{ matrix.module }} ${{ matrix.platform }} ${{ matrix.arch }} ${{ matrix.library_file }} release
          fi

      - name: Build Android native libraries (Linux only - arm64-v8a, x86_64)
        if: runner.os == 'Linux'
        run: |
          just kotlin-bindings-generate-android ${{ matrix.module }}

      - name: Upload OpenSSL Configure logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: openssl-configure-logs-${{ matrix.module }}-${{ matrix.display_name }}
          path: |
            ${{ env.CARGO_TARGET_DIR }}/**/configure.log
            ${{ github.workspace }}/**/configure.log
          if-no-files-found: warn

      - name: Upload Resources
        uses: actions/upload-artifact@v6
        with:
          name: kotlin-${{ matrix.module }}-bindings-${{ matrix.display_name }}
          path: |
            ${{ env.OUT_ROOT }}/resources/**
            ${{ env.OUT_ROOT }}/kotlin/**
            ${{ env.OUT_ROOT }}/android-jni/**
          if-no-files-found: warn
  swift-xcframework:
    name: Swift bindings (${{ matrix.module }} - darwin-universal)
    runs-on: macos-26
    env:
      OUT_ROOT: ${{ github.workspace }}/artifacts/swift/${{ matrix.module }}/generated/uniffi
      CARGO_TARGET_DIR: ${{ github.workspace }}/artifacts/swift/${{ matrix.module }}/cargo
      RUST_BACKTRACE: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: healthcard
            swift_dir: core-modules-swift/healthcard
            wrapper_src: core-modules-swift/healthcard/Sources/OpenHealthHealthcard/OpenHealthHealthcard.swift
            wrapper_out: OpenHealthHealthcard.swift
            ffi_name: OpenHealthHealthcardFFI
          - module: asn1
            swift_dir: core-modules-swift/asn1
            wrapper_src: core-modules-swift/asn1/Sources/OpenHealthAsn1/OpenHealthAsn1.swift
            wrapper_out: OpenHealthAsn1.swift
            ffi_name: OpenHealthAsn1FFI
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios, aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache Cargo builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> ${{ env.CARGO_TARGET_DIR }}"

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build XCFramework
        run: just swift-xcframework ${{ matrix.module }}

      - name: Stage Swift wrapper for release
        run: cp ${{ matrix.wrapper_src }} ${{ matrix.wrapper_out }}

      - name: Upload Swift wrapper
        uses: actions/upload-artifact@v6
        with:
          name: swift-${{ matrix.module }}-wrapper
          path: ${{ matrix.wrapper_out }}
          if-no-files-found: error

      - name: Upload OpenSSL Configure logs (Swift - on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: openssl-configure-logs-swift-${{ matrix.module }}
          path: |
            ${{ env.CARGO_TARGET_DIR }}/**/configure.log
            ${{ github.workspace }}/**/configure.log
          if-no-files-found: warn

      - name: Zip XCFramework
        working-directory: ${{ matrix.swift_dir }}
        run: zip -r ${{ matrix.ffi_name }}.xcframework.zip ${{ matrix.ffi_name }}.xcframework

      - name: Write XCFramework checksum
        working-directory: ${{ matrix.swift_dir }}
        run: |
          swift package compute-checksum ${{ matrix.ffi_name }}.xcframework.zip > ${{ matrix.ffi_name }}.xcframework.sha256

      - name: Upload XCFramework Zip
        uses: actions/upload-artifact@v6
        with:
          name: swift-${{ matrix.module }}-xcframework
          path: ${{ matrix.swift_dir }}/${{ matrix.ffi_name }}.xcframework.zip

      - name: Upload XCFramework checksum
        uses: actions/upload-artifact@v6
        with:
          name: swift-${{ matrix.module }}-xcframework-checksum
          path: ${{ matrix.swift_dir }}/${{ matrix.ffi_name }}.xcframework.sha256

  assemble-kotlin-bindings:
    name: Assemble Kotlin bindings bundle
    runs-on: ubuntu-latest
    needs: [kotlin-bindings-host]
    steps:
      - name: Checkout (for directory layout)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Download healthcard platform artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: "kotlin-healthcard-bindings-*"
          path: assembly/input/healthcard

      - name: Download asn1 platform artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: "kotlin-asn1-bindings-*"
          path: assembly/input/asn1

      - name: Collect libraries and generated Kotlin (healthcard + asn1)
        run: |
          just kotlin-bindings-assemble assembly/input/healthcard assembly/dist/healthcard/generated/uniffi
          just kotlin-bindings-assemble assembly/input/asn1 assembly/dist/asn1/generated/uniffi

      - name: Upload Kotlin bindings bundle (healthcard)
        uses: actions/upload-artifact@v6
        with:
          name: kotlin-bindings-bundle
          path: |
            assembly/dist/healthcard/generated/uniffi/resources/**
            assembly/dist/healthcard/generated/uniffi/kotlin/**
            assembly/dist/healthcard/generated/uniffi/android-jni/**
          if-no-files-found: error

      - name: Upload Kotlin bindings bundle (asn1)
        uses: actions/upload-artifact@v6
        with:
          name: kotlin-asn1-bindings-bundle
          path: |
            assembly/dist/asn1/generated/uniffi/resources/**
            assembly/dist/asn1/generated/uniffi/kotlin/**
            assembly/dist/asn1/generated/uniffi/android-jni/**
          if-no-files-found: error

      - name: Publish Kotlin bindings to mavenLocal (assembled outputs)
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            export ORG_GRADLE_PROJECT_version="${{ inputs.version }}"
          fi
          OUT_ROOT="${GITHUB_WORKSPACE}/assembly/dist/healthcard/generated/uniffi" just kotlin-publish-local healthcard
          OUT_ROOT="${GITHUB_WORKSPACE}/assembly/dist/asn1/generated/uniffi" just kotlin-publish-local asn1

      - name: Stage Maven local artifacts for upload
        run: |
          set -euo pipefail
          upload_root="${GITHUB_WORKSPACE}/assembly/maven-repo"
          src_root="${HOME}/.m2/repository/de/gematik/openhealth"
          mkdir -p "${upload_root}/de/gematik"
          cp -a "${src_root}" "${upload_root}/de/gematik/"

      - name: Upload Maven local artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kotlin-bindings-maven-local
          path: assembly/maven-repo
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [swift-xcframework, assemble-kotlin-bindings]
    if: inputs.version != ''
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Swift healthcard Artifact
        uses: actions/download-artifact@v7
        with:
          name: swift-healthcard-xcframework
          path: artifacts/swift/healthcard

      - name: Download Swift healthcard wrapper
        uses: actions/download-artifact@v7
        with:
          name: swift-healthcard-wrapper
          path: artifacts/swift-wrapper/healthcard
      
      - name: Download Swift healthcard checksum
        uses: actions/download-artifact@v7
        with:
          name: swift-healthcard-xcframework-checksum
          path: artifacts/swift-checksum/healthcard

      - name: Download Swift asn1 Artifact
        uses: actions/download-artifact@v7
        with:
          name: swift-asn1-xcframework
          path: artifacts/swift/asn1

      - name: Download Swift asn1 wrapper
        uses: actions/download-artifact@v7
        with:
          name: swift-asn1-wrapper
          path: artifacts/swift-wrapper/asn1
      
      - name: Download Swift asn1 checksum
        uses: actions/download-artifact@v7
        with:
          name: swift-asn1-xcframework-checksum
          path: artifacts/swift-checksum/asn1

      - name: Download Kotlin Artifact
        uses: actions/download-artifact@v7
        with:
          name: kotlin-bindings-maven-local
          path: artifacts/kotlin

      - name: Zip Kotlin Maven Repo
        run: |
          cd artifacts/kotlin
          zip -r ../../maven-repo.zip .

      - name: Update Package.swift
        run: |
          VERSION="${{ inputs.version }}"
          for module in healthcard asn1; do
            case "${module}" in
              healthcard)
                ffi_name="OpenHealthHealthcardFFI"
                wrapper_file="OpenHealthHealthcard.swift"
                wrapper_dest="core-modules-swift/healthcard/Sources/OpenHealthHealthcard/OpenHealthHealthcard.swift"
                sed_path="core-modules-swift/healthcard/OpenHealthHealthcardFFI.xcframework"
                checksum_path="artifacts/swift-checksum/healthcard/OpenHealthHealthcardFFI.xcframework.sha256"
                wrapper_src="artifacts/swift-wrapper/healthcard/OpenHealthHealthcard.swift"
                ;;
              asn1)
                ffi_name="OpenHealthAsn1FFI"
                wrapper_file="OpenHealthAsn1.swift"
                wrapper_dest="core-modules-swift/asn1/Sources/OpenHealthAsn1/OpenHealthAsn1.swift"
                sed_path="core-modules-swift/asn1/OpenHealthAsn1FFI.xcframework"
                checksum_path="artifacts/swift-checksum/asn1/OpenHealthAsn1FFI.xcframework.sha256"
                wrapper_src="artifacts/swift-wrapper/asn1/OpenHealthAsn1.swift"
                ;;
              *)
                echo "Unknown module: ${module}" >&2
                exit 2
                ;;
            esac

            CHECKSUM="$(cat "${checksum_path}")"
            REPO_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/${ffi_name}.xcframework.zip"

            mkdir -p "$(dirname "${wrapper_dest}")"
            cp "${wrapper_src}" "${wrapper_dest}"

            sed -i "s|path: \"${sed_path}\"|url: \"${REPO_URL}\", checksum: \"${CHECKSUM}\"|" Package.swift
          done
          
          # Verify change
          cat Package.swift

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Package.swift
          git add -f core-modules-swift/healthcard/Sources/OpenHealthHealthcard/OpenHealthHealthcard.swift
          git add -f core-modules-swift/asn1/Sources/OpenHealthAsn1/OpenHealthAsn1.swift
          git commit -m "Release ${VERSION}"
          git tag "${VERSION}"
          git push origin "${VERSION}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: |
            artifacts/swift/healthcard/OpenHealthHealthcardFFI.xcframework.zip
            artifacts/swift/asn1/OpenHealthAsn1FFI.xcframework.zip
            maven-repo.zip
          generate_release_notes: true
